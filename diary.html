<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piedra, Puño y Camino — El Diario de Brôin Piedraplana</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;600;700&family=UnifrakturCook:wght@700&family=MedievalSharp&family=Pirata+One&display=swap" rel="stylesheet">

    <style>
/* ============================================================
   CSS VARIABLES — PALETA DEL DIARIO
============================================================ */
:root {
    --bg-void:           #1a1410;
    --bg-deep:           #221912;
    --bg-stone:          #2a1f16;

    --parchment:         #e0cca4;
    --parchment-warm:    #d9c095;
    --parchment-cool:    #d4c3a0;
    --parchment-dim:     #c3b088;
    --parchment-deep:    #a89470;
    --parchment-shadow:  #8e7a56;
    --parchment-edge:    #6b5a3e;

    --ink-main:          #2c1f12;
    --ink-brown:         #3f2a14;
    --ink-faded:         #5a432a;
    --ink-margin:        #7a5e3e;
    --ink-red:           #7c2018;
    --ink-red-deep:      #5a1510;

    --bronze:            #a87a3a;
    --bronze-bright:     #d4a257;
    --bronze-dim:        #6e4d22;
    --bronze-deep:       #4a3316;
    --leather:           #4a2f18;
    --leather-dark:      #2e1a0a;
    --leather-mid:       #3a2312;
    --leather-light:     #5c3a20;

    --amber:             #c88438;
    --amber-deep:        #9a5a1e;
    --amber-glow:        rgba(200, 132, 56, 0.35);
    --candle-glow:       rgba(255, 180, 90, 0.22);

    --text-ui:           #c8b58b;
    --text-ui-dim:       #8a7958;
    --text-ui-faint:     #5a4a33;

    --shadow-deep:       rgba(0, 0, 0, 0.65);
    --shadow-page:       rgba(0, 0, 0, 0.45);
    --shadow-ink:        rgba(40, 20, 8, 0.55);
    --shadow-book:       rgba(0, 0, 0, 0.75);

    --font-hand:         'IM Fell English', Georgia, serif;
    --font-chronicle:    'MedievalSharp', 'IM Fell English', serif;
    --font-display:      'UnifrakturCook', 'MedievalSharp', serif;
    --font-capital:      'Pirata One', 'UnifrakturCook', serif;
    --font-metadata:     'Cinzel', serif;

    --transition:        all 0.35s ease;

    /* Dimensiones del libro */
    --book-w:            min(580px, 88vw);
    --book-h:            min(780px, 85vh);
    --page-turn-time:    0.75s;
}

/* ============================================================
   RESET & BASE
============================================================ */
*, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

html { font-size: 16px; }

body {
    background: var(--bg-void);
    color: var(--text-ui);
    font-family: var(--font-hand);
    line-height: 1.75;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
}

/* Fondo del escritorio */
body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
        radial-gradient(ellipse 60vw 50vh at 15% 20%,
            var(--candle-glow) 0%, transparent 55%),
        radial-gradient(ellipse 80vw 70vh at 50% 50%,
            rgba(120, 80, 40, 0.08) 0%, transparent 70%),
        radial-gradient(ellipse 120vw 120vh at 50% 50%,
            transparent 40%, rgba(0, 0, 0, 0.55) 100%);
    pointer-events: none;
    z-index: 0;
}

/* Grain overlay */
body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
        url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
    opacity: 0.08;
    pointer-events: none;
    z-index: 9999;
    mix-blend-mode: overlay;
}

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg-void); }
::-webkit-scrollbar-thumb { background: var(--bronze-dim); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--bronze); }

/* ============================================================
   VELA
============================================================ */
.candle {
    position: fixed;
    top: 2rem;
    left: 2rem;
    width: 90px;
    height: 160px;
    pointer-events: none;
    z-index: 2;
    opacity: 0.9;
}

.candle__flame {
    transform-origin: 50% 100%;
    animation: flicker 2.3s infinite ease-in-out;
}

.candle__glow {
    transform-origin: 50% 50%;
    animation: glow 2.3s infinite ease-in-out;
}

@keyframes flicker {
    0%, 100% { transform: scaleY(1)    scaleX(1)    translateX(0); }
    25%      { transform: scaleY(1.08) scaleX(0.96) translateX(0.5px); }
    50%      { transform: scaleY(0.95) scaleX(1.04) translateX(-0.3px); }
    75%      { transform: scaleY(1.05) scaleX(0.97) translateX(0.2px); }
}

@keyframes glow {
    0%, 100% { opacity: 0.65; transform: scale(1); }
    50%      { opacity: 0.85; transform: scale(1.08); }
}

/* ============================================================
   POLVO
============================================================ */
.dust {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
}

.dust__particle {
    position: absolute;
    width: 2px;
    height: 2px;
    background: rgba(255, 210, 140, 0.4);
    border-radius: 50%;
    box-shadow: 0 0 3px rgba(255, 200, 120, 0.3);
}

@keyframes drift {
    0%   { transform: translate(0, 0); opacity: 0; }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.4; }
    100% { transform: translate(var(--drift-x, 30px), var(--drift-y, -60vh)); opacity: 0; }
}

/* ============================================================
   ESCENA — BOOK STAGE
   Contiene tanto la tapa cerrada como el libro abierto.
   La transición entre ambos estados ocurre en la misma escena,
   con perspectiva.
============================================================ */
.stage {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    position: relative;
    z-index: 1;
    perspective: 2200px;
    perspective-origin: 50% 50%;
}

/* ============================================================
   TAPA CERRADA DEL LIBRO
============================================================ */
.book-cover {
    width: var(--book-w);
    height: var(--book-h);
    position: relative;
    transform-style: preserve-3d;
    transition: transform 1.2s cubic-bezier(0.65, 0.05, 0.36, 1),
                opacity 0.4s ease;
    transform-origin: 0% 50%;  /* bisagra izquierda */
    cursor: pointer;
    will-change: transform;
}

.book-cover__face {
    position: absolute;
    inset: 0;
    border-radius: 4px 8px 8px 4px;

    background:
        /* Variaciones de grano */
        radial-gradient(ellipse 80% 60% at 30% 30%,
            var(--leather-light) 0%,
            transparent 50%),
        radial-gradient(ellipse 70% 70% at 70% 80%,
            var(--leather-dark) 0%,
            transparent 60%),
        linear-gradient(135deg,
            var(--leather-light) 0%,
            var(--leather) 35%,
            var(--leather-mid) 65%,
            var(--leather-dark) 100%);

    box-shadow:
        /* Sombra proyectada */
        0 40px 80px var(--shadow-book),
        0 10px 30px var(--shadow-deep),
        /* Borde interior: simula canto del cuero */
        inset 0 0 0 1px rgba(0, 0, 0, 0.4),
        inset 0 0 0 5px rgba(90, 60, 30, 0.25),
        /* Brillo sutil en esquina superior izquierda */
        inset 8px 8px 30px rgba(180, 120, 70, 0.15);
}

/* Textura de cuero granulado */
.book-cover__face::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background-image:
        url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='lth'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' seed='4'/%3E%3CfeColorMatrix values='0 0 0 0 0.2  0 0 0 0 0.12  0 0 0 0 0.06  0 0 0 0.5 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23lth)'/%3E%3C/svg%3E");
    mix-blend-mode: overlay;
    opacity: 0.65;
    pointer-events: none;
}

/* Marco grabado (hendidura perimetral) */
.book-cover__face::after {
    content: '';
    position: absolute;
    inset: 22px;
    border: 1px solid rgba(0, 0, 0, 0.4);
    box-shadow:
        inset 0 0 0 1px rgba(200, 140, 70, 0.08),
        0 0 0 1px rgba(200, 140, 70, 0.1);
    border-radius: 2px;
    pointer-events: none;
}

/* Contenido de la tapa */
.book-cover__content {
    position: absolute;
    inset: 45px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 1rem;
    text-align: center;
    z-index: 2;
}

.book-cover__title {
    font-family: var(--font-display);
    font-size: clamp(1.5rem, 3vw, 2.2rem);
    color: var(--bronze-bright);
    letter-spacing: 0.03em;
    line-height: 1.15;
    text-shadow:
        0 1px 0 rgba(0, 0, 0, 0.6),
        0 -1px 0 rgba(230, 180, 110, 0.2),
        0 0 20px rgba(212, 162, 87, 0.25);
    margin-top: 1rem;
}

.book-cover__subtitle {
    font-family: var(--font-hand);
    font-style: italic;
    font-size: clamp(0.85rem, 1.3vw, 1rem);
    color: var(--bronze);
    margin-top: 0.5rem;
    letter-spacing: 0.03em;
    opacity: 0.85;
    text-shadow: 0 1px 0 rgba(0, 0, 0, 0.5);
}

.book-cover__sigil {
    width: 55%;
    max-width: 280px;
    aspect-ratio: 1;
    margin: 1rem 0;
    filter: drop-shadow(0 2px 0 rgba(0,0,0,0.5))
            drop-shadow(0 -1px 0 rgba(230, 180, 110, 0.15));
}

.book-cover__chapter {
    font-family: var(--font-metadata);
    font-size: 0.75rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--bronze);
    opacity: 0.7;
    margin-bottom: 1rem;
}

.book-cover__prompt {
    position: absolute;
    bottom: -3rem;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--font-metadata);
    font-size: 0.7rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--text-ui-dim);
    opacity: 0;
    animation: fadeInPrompt 0.8s ease 0.5s forwards,
               promptPulse 2.8s ease-in-out 1.8s infinite;
    white-space: nowrap;
}

@keyframes fadeInPrompt {
    to { opacity: 0.7; }
}

@keyframes promptPulse {
    0%, 100% { opacity: 0.7; }
    50%      { opacity: 0.35; }
}

/* Cierres metálicos */
.book-cover__clasp {
    position: absolute;
    right: -6px;
    width: 22px;
    height: 36px;
    background:
        linear-gradient(90deg,
            var(--bronze-deep) 0%,
            var(--bronze) 30%,
            var(--bronze-bright) 50%,
            var(--bronze) 70%,
            var(--bronze-deep) 100%);
    border-radius: 0 3px 3px 0;
    box-shadow:
        2px 2px 4px rgba(0, 0, 0, 0.5),
        inset 0 1px 2px rgba(255, 200, 120, 0.3),
        inset 0 -1px 2px rgba(0, 0, 0, 0.4);
    z-index: 3;
}

.book-cover__clasp::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 4px;
    width: 8px;
    height: 8px;
    transform: translateY(-50%);
    background: var(--bronze-deep);
    border-radius: 50%;
    box-shadow: inset 0 1px 1px rgba(0,0,0,0.5);
}

.book-cover__clasp--top    { top: 18%; }
.book-cover__clasp--bottom { bottom: 18%; }

/* Lomo del libro (sombra derecha sutil) */
.book-cover__spine {
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 14px;
    background: linear-gradient(90deg,
        transparent 0%,
        rgba(0, 0, 0, 0.3) 100%);
    pointer-events: none;
}

/* Hover effect antes de abrir */
.book-cover:hover:not(.book-cover--opening):not(.book-cover--opened) {
    transform: translateY(-6px) rotateY(-2deg);
    filter: brightness(1.08);
}

/* Animación de apertura */
.book-cover--opening {
    transform: rotateY(-160deg);
    pointer-events: none;
}

.book-cover--opened {
    display: none;
}

/* ============================================================
   LIBRO ABIERTO — contenedor que aparece tras apertura
============================================================ */
.book-open {
    display: none;
    width: min(760px, 94vw);
    flex-direction: column;
    align-items: center;
    opacity: 0;
    transition: opacity 0.6s ease 0.3s;
}

.book-open--visible {
    display: flex;
    opacity: 1;
}

/* Header del libro abierto */
.book-header {
    text-align: center;
    margin-bottom: 2rem;
    max-width: 800px;
}

.book-header__chapter {
    font-family: var(--font-metadata);
    font-size: 0.72rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--text-ui-dim);
    margin-bottom: 0.9rem;
}

.book-header__title {
    font-family: var(--font-display);
    font-size: clamp(1.5rem, 3.5vw, 2.2rem);
    color: var(--bronze-bright);
    letter-spacing: 0.02em;
    line-height: 1.15;
    margin-bottom: 0.3rem;
    text-shadow: 0 0 30px var(--amber-glow), 0 2px 4px rgba(0,0,0,0.5);
}

.book-header__subtitle {
    font-family: var(--font-hand);
    font-style: italic;
    color: var(--text-ui-dim);
    font-size: 0.95rem;
}

/* Botón cerrar libro (oculto hasta que se abre el libro) */
.close-book {
    position: fixed;
    top: 1.5rem;
    right: 1.5rem;
    background: transparent;
    border: 1px solid var(--bronze-dim);
    color: var(--bronze);
    font-family: var(--font-metadata);
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    padding: 0.6rem 1rem;
    cursor: pointer;
    transition: opacity 0.4s ease, color 0.35s ease, border-color 0.35s ease, background 0.35s ease;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
}

/* Visible sólo cuando el libro está abierto */
body.book-is-open .close-book {
    opacity: 0.7;
    pointer-events: auto;
}

.close-book:hover {
    border-color: var(--bronze);
    color: var(--bronze-bright);
    background: rgba(168, 122, 58, 0.08);
    opacity: 1 !important;
}

/* ============================================================
   PÁGINAS — contenedor con perspectiva para el giro
============================================================ */
.pages-wrap {
    position: relative;
    width: min(760px, 94vw);
    perspective: 2000px;
    perspective-origin: 0% 50%;
}

.page-stack {
    position: relative;
    min-height: 70vh;
}

/* La página "fantasma" debajo muestra la entrada destino
   durante el giro. Absolute para que esté detrás. */
.page-ghost {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 1;
}

/* La página actual está encima. Cuando gira, deja ver la fantasma. */
.page-current {
    position: relative;
    z-index: 2;
    transform-origin: 0% 50%;
    backface-visibility: hidden;
    transition: transform var(--page-turn-time) cubic-bezier(0.45, 0.05, 0.55, 0.95),
                box-shadow var(--page-turn-time) ease;
    will-change: transform;
}

/* Animaciones de giro: siguiente (gira hacia la izquierda) */
.page-current--turning-next {
    transform: rotateY(-175deg);
    box-shadow:
        -20px 20px 40px rgba(0, 0, 0, 0.5),
        0 25px 70px var(--shadow-deep);
}

/* Animación de giro inverso (anterior) */
.page-current--turning-prev {
    animation: turnPrev var(--page-turn-time) cubic-bezier(0.45, 0.05, 0.55, 0.95);
}

@keyframes turnPrev {
    0%   { transform: rotateY(-175deg); }
    100% { transform: rotateY(0deg); }
}

/* ============================================================
   PÁGINA DE PERGAMINO
============================================================ */
.page {
    --page-pad-x: 3.5rem;
    --page-pad-y: 4rem;

    width: 100%;
    min-height: 70vh;
    padding: var(--page-pad-y) var(--page-pad-x);
    position: relative;
    isolation: isolate;

    background:
        radial-gradient(ellipse 90% 70% at 30% 20%,
            var(--parchment-warm) 0%, transparent 40%),
        radial-gradient(ellipse 70% 80% at 80% 85%,
            var(--parchment-cool) 0%, transparent 45%),
        linear-gradient(135deg,
            var(--parchment) 0%, var(--parchment-dim) 100%);

    color: var(--ink-main);
    font-family: var(--font-hand);
    font-size: 1.15rem;
    line-height: 1.85;

    box-shadow:
        0 25px 70px var(--shadow-deep),
        0 4px 12px var(--shadow-page),
        inset 0 0 0 1px rgba(120, 90, 50, 0.25);

    border-radius: 1px;
}

/* Textura pergamino */
.page::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
        url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='p'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.03 0.8' numOctaves='3' seed='7'/%3E%3CfeColorMatrix values='0 0 0 0 0.35  0 0 0 0 0.25  0 0 0 0 0.15  0 0 0 0.18 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23p)'/%3E%3C/svg%3E");
    mix-blend-mode: multiply;
    opacity: 0.5;
    pointer-events: none;
    z-index: 0;
}

/* Viñeta oscura en bordes */
.page::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
        radial-gradient(ellipse 50% 50% at 0% 0%,
            rgba(100, 65, 30, 0.3) 0%, transparent 35%),
        radial-gradient(ellipse 50% 50% at 100% 0%,
            rgba(100, 65, 30, 0.3) 0%, transparent 35%),
        radial-gradient(ellipse 50% 50% at 0% 100%,
            rgba(100, 65, 30, 0.3) 0%, transparent 35%),
        radial-gradient(ellipse 50% 50% at 100% 100%,
            rgba(100, 65, 30, 0.3) 0%, transparent 35%),
        radial-gradient(ellipse 100% 100%,
            transparent 75%, rgba(90, 55, 25, 0.35) 100%);
    pointer-events: none;
    z-index: 0;
}

.page > * {
    position: relative;
    z-index: 2;
}

.page-stains {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
}

.stain {
    position: absolute;
    pointer-events: none;
}

.page__number {
    position: absolute;
    bottom: 1.4rem;
    right: 1.8rem;
    font-family: var(--font-metadata);
    font-size: 0.75rem;
    color: var(--ink-faded);
    letter-spacing: 0.2em;
    z-index: 3;
}

/* ============================================================
   FRONTISPICIO
============================================================ */
.frontispiece {
    text-align: center;
    padding: 2rem 0;
}

.frontispiece__ornament-top,
.frontispiece__ornament-bottom {
    width: 200px;
    height: 28px;
    margin: 0 auto;
    opacity: 0.7;
}

.frontispiece__ornament-top { margin-bottom: 2rem; }
.frontispiece__ornament-bottom { margin-top: 2rem; }

.frontispiece__chapter {
    font-family: var(--font-metadata);
    font-size: 0.75rem;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--ink-faded);
    margin-bottom: 1.5rem;
}

.frontispiece__title {
    font-family: var(--font-chronicle);
    font-size: clamp(2.2rem, 5vw, 3.2rem);
    color: var(--ink-main);
    line-height: 1.1;
    letter-spacing: 0.02em;
    margin-bottom: 0.5rem;
    font-weight: normal;
}

.frontispiece__subtitle {
    font-family: var(--font-hand);
    font-style: italic;
    font-size: clamp(1rem, 2vw, 1.2rem);
    color: var(--ink-brown);
    margin-bottom: 2rem;
}

.frontispiece__portrait-frame {
    width: min(260px, 60%);
    aspect-ratio: 3/4;
    margin: 2rem auto;
    position: relative;
    padding: 12px;
    background: linear-gradient(135deg,
        var(--bronze-deep) 0%,
        var(--bronze) 30%,
        var(--bronze-bright) 50%,
        var(--bronze) 70%,
        var(--bronze-deep) 100%);
    box-shadow:
        0 6px 20px rgba(0,0,0,0.4),
        inset 0 0 0 1px rgba(0,0,0,0.3),
        inset 2px 2px 8px rgba(255, 200, 120, 0.25);
    border-radius: 2px;
}

.frontispiece__portrait-frame::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px solid var(--bronze-deep);
    pointer-events: none;
    z-index: 2;
}

.frontispiece__portrait-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    position: relative;
    z-index: 1;
    filter: sepia(0.2) contrast(1.05);
}

/* Placeholder si no hay retrato */
.frontispiece__portrait-placeholder {
    width: 100%;
    height: 100%;
    background:
        linear-gradient(135deg,
            var(--parchment-deep) 0%,
            var(--parchment-shadow) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-faded);
    font-family: var(--font-hand);
    font-style: italic;
    font-size: 0.85rem;
    padding: 1rem;
    text-align: center;
}

.frontispiece__epigraph {
    font-family: var(--font-hand);
    font-style: italic;
    font-size: 1.1rem;
    color: var(--ink-brown);
    margin: 2rem auto 1rem;
    max-width: 80%;
    line-height: 1.7;
    position: relative;
    padding: 0 1.5rem;
}

.frontispiece__epigraph::before,
.frontispiece__epigraph::after {
    font-family: var(--font-display);
    font-size: 2.5em;
    color: var(--ink-red);
    opacity: 0.3;
    line-height: 0.8;
    position: absolute;
}

.frontispiece__epigraph::before {
    content: '“';
    left: -0.5rem;
    top: 0;
}

.frontispiece__epigraph::after {
    content: '”';
    right: -0.5rem;
    bottom: -0.5rem;
}

.frontispiece__epigraph-source {
    font-family: var(--font-metadata);
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink-faded);
    margin-top: 1rem;
    font-style: normal;
}

.frontispiece__context {
    font-family: var(--font-hand);
    font-style: italic;
    color: var(--ink-margin);
    font-size: 0.95rem;
    margin-top: 2rem;
    line-height: 1.7;
    max-width: 85%;
    margin-left: auto;
    margin-right: auto;
}

.frontispiece__dedication {
    font-family: var(--font-hand);
    font-style: italic;
    color: var(--ink-brown);
    font-size: 0.95rem;
    margin-top: 1.5rem;
    line-height: 1.7;
    max-width: 80%;
    margin-left: auto;
    margin-right: auto;
    padding-top: 1.5rem;
    border-top: 1px dotted var(--parchment-shadow);
}

/* ============================================================
   ÍNDICE MANUSCRITO DECORADO
============================================================ */
.index-page {
    padding: 2rem 0;
}

.index-page__title {
    text-align: center;
    margin-bottom: 2.5rem;
}

.index-page__label {
    font-family: var(--font-metadata);
    font-size: 0.72rem;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--ink-faded);
    margin-bottom: 0.6rem;
}

.index-page__heading {
    font-family: var(--font-chronicle);
    font-size: clamp(1.8rem, 4vw, 2.5rem);
    color: var(--ink-main);
    line-height: 1.2;
    font-weight: normal;
    margin-bottom: 0.8rem;
}

.index-page__flourish {
    width: 140px;
    height: 20px;
    margin: 0 auto;
    opacity: 0.7;
}

.index-list {
    list-style: none;
    max-width: 90%;
    margin: 0 auto;
}

.index-entry {
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
    padding: 0.9rem 0;
    border-bottom: 1px dotted rgba(90, 67, 42, 0.3);
    cursor: pointer;
    transition: background 0.2s ease, padding 0.2s ease;
}

.index-entry:hover {
    background: rgba(200, 132, 56, 0.06);
    padding-left: 0.5rem;
    padding-right: 0.5rem;
}

.index-entry__roman {
    font-family: var(--font-capital);
    font-size: 1.8rem;
    color: var(--ink-red);
    min-width: 3.5rem;
    text-align: center;
    line-height: 1;
    text-shadow: 0 0 10px rgba(124, 32, 24, 0.15);
}

.index-entry__body {
    flex: 1;
    min-width: 0;
}

.index-entry__title {
    font-family: var(--font-chronicle);
    font-size: 1.15rem;
    color: var(--ink-main);
    line-height: 1.3;
    margin-bottom: 0.2rem;
}

.index-entry__meta {
    font-family: var(--font-hand);
    font-style: italic;
    font-size: 0.85rem;
    color: var(--ink-faded);
    line-height: 1.5;
}

.index-entry__dots {
    flex: 1;
    border-bottom: 2px dotted var(--parchment-shadow);
    margin-bottom: 0.3rem;
    min-width: 2rem;
    opacity: 0.5;
}

.index-entry__page {
    font-family: var(--font-metadata);
    font-size: 0.9rem;
    color: var(--ink-brown);
    letter-spacing: 0.15em;
    min-width: 2.5rem;
    text-align: right;
}

.index-page__footnote {
    margin-top: 3rem;
    text-align: center;
    font-family: var(--font-hand);
    font-style: italic;
    font-size: 0.9rem;
    color: var(--ink-margin);
    max-width: 70%;
    margin-left: auto;
    margin-right: auto;
}

/* ============================================================
   CABECERA DE ENTRADA
============================================================ */
.entry-header {
    text-align: center;
    margin-bottom: 2.5rem;
    position: relative;
}

.entry-header__roman {
    font-family: var(--font-metadata);
    font-size: 0.72rem;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--ink-faded);
    margin-bottom: 0.6rem;
}

.entry-header__title {
    font-family: var(--font-chronicle);
    font-size: clamp(1.7rem, 3.8vw, 2.3rem);
    color: var(--ink-main);
    line-height: 1.2;
    margin-bottom: 1.2rem;
    font-weight: normal;
}

.entry-header__flourish {
    width: 140px;
    height: 20px;
    margin: 0 auto 1.2rem;
    opacity: 0.7;
}

.entry-header__meta {
    font-family: var(--font-hand);
    font-style: italic;
    font-size: 0.98rem;
    color: var(--ink-faded);
    line-height: 1.6;
}

.entry-header__meta-line { display: inline; }

.entry-header__meta-sep {
    color: var(--parchment-shadow);
    margin: 0 0.6rem;
    font-style: normal;
}

.entry-header__party {
    display: block;
    margin-top: 0.5rem;
    font-size: 0.9rem;
    color: var(--ink-margin);
}

/* ============================================================
   BLOQUES DE CONTENIDO
============================================================ */
.entry-body { padding-top: 0.5rem; }

.block-text {
    margin-bottom: 1.1rem;
    text-align: justify;
    hyphens: auto;
    text-indent: 1.5rem;
}

.block-text:first-child { text-indent: 0; }
.block-text:last-child { margin-bottom: 0; }

.entry-body > .block-text:first-child::first-letter {
    font-family: var(--font-capital);
    font-weight: normal;
    font-size: 4.5em;
    float: left;
    line-height: 0.82;
    padding: 0.08em 0.15em 0.1em 0.05em;
    margin: 0.08em 0.15em 0 0;
    color: var(--ink-red);
    text-shadow:
        1px 1px 0 rgba(124, 32, 24, 0.25),
        0 0 12px rgba(124, 32, 24, 0.12);
    background: radial-gradient(ellipse at center,
        rgba(200, 132, 56, 0.08) 0%, transparent 70%);
}

.block-quote {
    margin: 1.8rem 2rem;
    padding: 1rem 1.5rem 1rem 2rem;
    font-family: var(--font-hand);
    font-style: italic;
    color: var(--ink-brown);
    position: relative;
    font-size: 1.08rem;
    line-height: 1.7;
}

.block-quote::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0.5rem;
    bottom: 0.5rem;
    width: 2px;
    background: linear-gradient(to bottom,
        transparent 0%, var(--ink-faded) 20%,
        var(--ink-faded) 80%, transparent 100%);
}

.block-quote::after {
    content: '"';
    position: absolute;
    left: 0.5rem;
    top: -0.3rem;
    font-family: var(--font-display);
    font-size: 3.5em;
    color: var(--ink-red);
    opacity: 0.3;
    line-height: 1;
}

.block-margin-note {
    margin: 1.3rem 0 1.3rem auto;
    padding: 0.9rem 1.2rem;
    font-family: var(--font-hand);
    font-style: italic;
    font-size: 0.95rem;
    color: var(--ink-margin);
    max-width: 78%;
    position: relative;
    background: linear-gradient(180deg,
        transparent 0%,
        rgba(139, 100, 55, 0.05) 50%,
        transparent 100%);
    border-top: 1px dashed rgba(139, 100, 55, 0.35);
    border-bottom: 1px dashed rgba(139, 100, 55, 0.35);
}

.block-margin-note::before {
    content: "·  Añadido  ·";
    display: block;
    font-family: var(--font-metadata);
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--ink-margin);
    opacity: 0.55;
    margin-bottom: 0.5rem;
    font-style: normal;
}

.block-ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 2.2rem 0;
    position: relative;
    min-height: 20px;
}

.block-ornament svg {
    height: 18px;
    max-width: 60%;
    opacity: 0.6;
}

.block-sketch {
    margin: 1.8rem auto;
    text-align: center;
    max-width: 70%;
}

.block-sketch img {
    max-width: 100%;
    filter: sepia(0.3) contrast(0.95) brightness(0.92);
    opacity: 0.88;
}

.block-sketch__caption {
    font-family: var(--font-hand);
    font-style: italic;
    font-size: 0.9rem;
    color: var(--ink-faded);
    margin-top: 0.6rem;
}

/* ============================================================
   NAVEGACIÓN
============================================================ */
.nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 2.5rem;
    width: min(760px, 94vw);
    flex-wrap: wrap;
}

.nav__btn {
    background: transparent;
    border: 1px solid var(--bronze-dim);
    color: var(--bronze);
    font-family: var(--font-metadata);
    font-size: 0.72rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    padding: 0.8rem 1.6rem;
    cursor: pointer;
    transition: var(--transition);
    position: relative;
}

.nav__btn:hover:not(:disabled) {
    border-color: var(--bronze);
    color: var(--bronze-bright);
    background: rgba(168, 122, 58, 0.1);
    box-shadow: 0 0 20px rgba(168, 122, 58, 0.15);
}

.nav__btn:disabled {
    opacity: 0.25;
    cursor: not-allowed;
}

.nav__btn--ghost {
    border-color: var(--bronze-deep);
    opacity: 0.75;
    font-size: 0.65rem;
    padding: 0.6rem 1rem;
}

.nav__indicator {
    font-family: var(--font-metadata);
    font-size: 0.78rem;
    letter-spacing: 0.25em;
    color: var(--text-ui-dim);
    min-width: 7rem;
    text-align: center;
}

/* ============================================================
   ESTADOS
============================================================ */
.state-msg {
    width: min(720px, 92vw);
    padding: 3rem;
    text-align: center;
    background: var(--bg-deep);
    color: var(--text-ui-dim);
    font-family: var(--font-hand);
    font-style: italic;
    border: 1px solid var(--text-ui-faint);
}

.state-msg--error {
    color: var(--ink-red);
    border-color: var(--ink-red);
}

.diary-footer {
    margin-top: 3.5rem;
    text-align: center;
    font-family: var(--font-metadata);
    font-size: 0.68rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--text-ui-faint);
}

/* ============================================================
   PLACEHOLDER BADGE
============================================================ */
.placeholder-badge {
    position: absolute;
    top: 1.5rem;
    right: 1.8rem;
    font-family: var(--font-metadata);
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink-margin);
    opacity: 0.55;
    border: 1px solid var(--ink-margin);
    padding: 0.25rem 0.6rem;
    z-index: 3;
    background: rgba(255, 255, 255, 0.06);
}

/* ============================================================
   RESPONSIVE
============================================================ */
@media (max-width: 720px) {
    :root {
        --book-w: 88vw;
        --book-h: 75vh;
    }

    .page {
        --page-pad-x: 2rem;
        --page-pad-y: 2.75rem;
        font-size: 1.05rem;
    }

    .block-margin-note { max-width: 100%; margin-right: 0; }
    .block-quote { margin: 1.5rem 0.5rem; }
    .candle { width: 60px; height: 110px; top: 1rem; left: 1rem; opacity: 0.75; }
    .entry-body > .block-text:first-child::first-letter { font-size: 3.8em; }
    .close-book { top: 0.75rem; right: 0.75rem; font-size: 0.6rem; padding: 0.5rem 0.75rem; }
    .index-entry__roman { font-size: 1.4rem; min-width: 2.5rem; }
}

@media (max-width: 480px) {
    .candle { display: none; }
    .stage { padding-top: 1rem; padding-bottom: 1rem; }
    .book-cover__sigil { width: 45%; }
    .nav { gap: 1rem; }
    .nav__btn { padding: 0.6rem 1rem; font-size: 0.65rem; }
}

/* Honra prefers-reduced-motion */
@media (prefers-reduced-motion: reduce) {
    .book-cover,
    .page-current,
    .candle__flame,
    .candle__glow,
    .dust__particle {
        animation: none !important;
        transition: none !important;
    }
    .book-cover--opening { transform: none; opacity: 0; }
}

    <script>
// ============================================================
// DIARIO DE BRÔIN — FASE 3
// Flujo: tapa cerrada → (clic) apertura → frontispicio → índice → entradas
// Con animación de giro de página entre vistas.
// ============================================================

const STATE = {
    broin: null,
    entries: [],
    // Índice "virtual" de todas las vistas del libro: frontispicio (0), índice (1), entradas (2+)
    views: [],
    currentView: 0,
    opened: false,
    turning: false,
    editMode: false
};

const LS_LAST_VIEW = 'broin.diary.lastViewIndex';
const LS_OPENED    = 'broin.diary.opened';

// ------------------------------------------------------------
// UTILIDADES
// ------------------------------------------------------------

function toRoman(n) {
    if (n <= 0) return '';
    const map = [
        [1000,'M'],[900,'CM'],[500,'D'],[400,'CD'],
        [100,'C'],[90,'XC'],[50,'L'],[40,'XL'],
        [10,'X'],[9,'IX'],[5,'V'],[4,'IV'],[1,'I']
    ];
    let out = '';
    for (const [v, s] of map) { while (n >= v) { out += s; n -= v; } }
    return out;
}

function escapeHtml(s) {
    if (s == null) return '';
    return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function mulberry32(seed) {
    return function() {
        let t = seed += 0x6D2B79F5;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
}

function detectEditMode() {
    const params = new URLSearchParams(window.location.search);
    STATE.editMode = (params.get('edit') === 'karumdar');
    if (STATE.editMode) {
        console.log('%c[diario] modo edición activo', 'color:#d4a257;font-weight:bold');
    }
}

// ------------------------------------------------------------
// DATA LOADING
// ------------------------------------------------------------

async function loadData() {
    try {
        const [broinRes, entriesRes] = await Promise.all([
            fetch('broin.json'),
            fetch('diary-entries.json')
        ]);
        if (!broinRes.ok)   throw new Error('No se pudo cargar broin.json');
        if (!entriesRes.ok) throw new Error('No se pudo cargar diary-entries.json');
        STATE.broin   = await broinRes.json();
        STATE.entries = (await entriesRes.json()).entries || [];
        buildViewsIndex();
        return true;
    } catch (e) {
        showError(e.message);
        return false;
    }
}

// Construye el listado de vistas: [frontispicio, índice, ...entradas]
function buildViewsIndex() {
    STATE.views = [
        { kind: 'frontispiece' },
        { kind: 'index' },
        ...STATE.entries.map(e => ({ kind: 'entry', entry: e }))
    ];
}

function showError(msg) {
    const mount = document.getElementById('pageCurrent');
    if (!mount) return;
    mount.innerHTML = `<div class="page"><div class="state-msg state-msg--error">${escapeHtml(msg)}</div></div>`;
}

// ------------------------------------------------------------
// RENDER DE BLOQUES (entradas)
// ------------------------------------------------------------

function renderBlock(block) {
    switch (block.type) {
        case 'text':
            return `<p class="block-text">${escapeHtml(block.content)}</p>`;
        case 'quote':
            return `<blockquote class="block-quote">${escapeHtml(block.content)}</blockquote>`;
        case 'margin_note':
            return `<aside class="block-margin-note">${escapeHtml(block.content)}</aside>`;
        case 'ornament': {
            const styleMap = {
                'divider':  'orn-floral',
                'dots':     'orn-dots',
                'flourish': 'orn-flourish'
            };
            const sym = styleMap[block.style] || 'orn-flourish';
            const vb  = (sym === 'orn-dots') ? '0 0 60 18'
                      : (sym === 'orn-floral') ? '0 0 180 20'
                      : '0 0 140 20';
            return `<div class="block-ornament"><svg viewBox="${vb}"><use href="#${sym}"/></svg></div>`;
        }
        case 'sketch':
            return `<figure class="block-sketch">
                <img src="${escapeHtml(block.image)}" alt="${escapeHtml(block.caption || '')}">
                ${block.caption ? `<figcaption class="block-sketch__caption">${escapeHtml(block.caption)}</figcaption>` : ''}
            </figure>`;
        default:
            return '';
    }
}

function generateStainsSvg(seed) {
    const rand = mulberry32(seed * 9973 + 17);

    const catalog = [
        { sym: 'stain-ink',     min: 30, max: 70,  prob: 0.85, rot: 360, opacity: [0.25, 0.55] },
        { sym: 'stain-ink',     min: 15, max: 30,  prob: 0.9,  rot: 360, opacity: [0.35, 0.7] },
        { sym: 'stain-beer',    min: 70, max: 110, prob: 0.4,  rot: 20,  opacity: [0.6, 0.9] },
        { sym: 'stain-wax',     min: 25, max: 45,  prob: 0.55, rot: 360, opacity: [0.5, 0.8] },
        { sym: 'nocti-feather', min: 40, max: 65,  prob: 0.35, rot: 180, opacity: [0.75, 0.95] },
        { sym: 'nocti-print',   min: 18, max: 28,  prob: 0.5,  rot: 360, opacity: [0.6, 0.85] },
        { sym: 'nocti-perched', min: 55, max: 75,  prob: 0.25, rot: 0,   opacity: [0.85, 0.95] }
    ];

    let html = '';
    catalog.forEach(item => {
        if (rand() > item.prob) return;
        const size = item.min + rand() * (item.max - item.min);
        let x = 3 + rand() * 88;
        let y = 3 + rand() * 92;
        const rot = (rand() - 0.5) * 2 * item.rot;
        const op = item.opacity[0] + rand() * (item.opacity[1] - item.opacity[0]);

        if (item.sym === 'nocti-perched') { x = 70 + rand() * 20; y = 1 + rand() * 5; }
        if (item.sym === 'nocti-feather') {
            const corner = Math.floor(rand() * 4);
            const offs = 2 + rand() * 6;
            if (corner === 0) { x = offs;       y = offs; }
            if (corner === 1) { x = 90 - offs;  y = offs; }
            if (corner === 2) { x = offs;       y = 85 - offs; }
            if (corner === 3) { x = 88 - offs;  y = 80 - offs; }
        }
        if (item.sym === 'stain-beer') { y = 55 + rand() * 40; }

        html += `<svg class="stain" style="left:${x.toFixed(2)}%;top:${y.toFixed(2)}%;width:${size.toFixed(1)}px;height:${size.toFixed(1)}px;opacity:${op.toFixed(2)};transform:rotate(${rot.toFixed(1)}deg);"><use href="#${item.sym}"/></svg>`;
    });
    return html;
}

// ------------------------------------------------------------
// RENDER: FRONTISPICIO
// ------------------------------------------------------------

function renderFrontispiece() {
    const b = STATE.broin || {};
    const book = b.book || {};

    // Si el archivo de retrato no existe, caer al placeholder sin romper el layout
    const portraitHtml = b.portrait
        ? `<img class="frontispiece__portrait-img"
                src="${escapeHtml(b.portrait)}"
                alt="Retrato de ${escapeHtml(b.name || '')}"
                onerror="this.outerHTML='<div class=&quot;frontispiece__portrait-placeholder&quot;>— retrato pendiente —</div>'">`
        : `<div class="frontispiece__portrait-placeholder">— retrato pendiente —</div>`;

    return `
        <article class="page">
            <div class="page-stains" aria-hidden="true">${generateStainsSvg(1)}</div>
            <div class="frontispiece">
                <svg class="frontispiece__ornament-top" viewBox="0 0 200 28" aria-hidden="true">
                    <use href="#orn-floral-large"/>
                </svg>

                <div class="frontispiece__chapter">${escapeHtml(book.current_chapter || 'Capítulo')}</div>
                <h1 class="frontispiece__title">${escapeHtml(book.title || '')}</h1>
                <p class="frontispiece__subtitle">${escapeHtml(book.subtitle || '')}</p>

                <div class="frontispiece__portrait-frame">
                    ${portraitHtml}
                </div>

                <blockquote class="frontispiece__epigraph">
                    ${escapeHtml(b.epigraph || '')}
                </blockquote>
                <div class="frontispiece__epigraph-source">
                    ${escapeHtml(b.epigraph_source || '')}
                </div>

                ${book.chapter_status ? `<p class="frontispiece__context">${escapeHtml(book.chapter_status)}</p>` : ''}

                ${b.dedication ? `<p class="frontispiece__dedication">${escapeHtml(b.dedication)}</p>` : ''}

                <svg class="frontispiece__ornament-bottom" viewBox="0 0 200 28" aria-hidden="true">
                    <use href="#orn-floral-large"/>
                </svg>
            </div>
            <div class="page__number">— i —</div>
        </article>
    `;
}

// ------------------------------------------------------------
// RENDER: ÍNDICE MANUSCRITO
// ------------------------------------------------------------

function renderIndex() {
    const entriesHtml = STATE.entries.map((e, i) => {
        const roman = toRoman(e.id);
        const viewIndex = 2 + i; // 0=frontispicio, 1=índice, 2+=entradas
        const metaBits = [];
        if (e.location)    metaBits.push(escapeHtml(e.location));
        if (e.time_of_day) metaBits.push(escapeHtml(e.time_of_day));
        return `
            <li class="index-entry" data-view-index="${viewIndex}" role="button" tabindex="0">
                <div class="index-entry__roman">${roman}</div>
                <div class="index-entry__body">
                    <div class="index-entry__title">${escapeHtml(e.title)}</div>
                    ${metaBits.length ? `<div class="index-entry__meta">${metaBits.join(' · ')}</div>` : ''}
                </div>
                <div class="index-entry__dots"></div>
                <div class="index-entry__page">${roman}</div>
            </li>`;
    }).join('');

    const footnote = STATE.entries.length > 0
        ? 'Pulsa sobre una entrada para abrir su página.'
        : 'No hay entradas escritas todavía. Setenta y tres páginas en blanco esperando.';

    return `
        <article class="page">
            <div class="page-stains" aria-hidden="true">${generateStainsSvg(2)}</div>
            <div class="index-page">
                <div class="index-page__title">
                    <div class="index-page__label">Tabla de lo escrito</div>
                    <h2 class="index-page__heading">Índice de entradas</h2>
                    <svg class="index-page__flourish" viewBox="0 0 140 20" aria-hidden="true">
                        <use href="#orn-flourish"/>
                    </svg>
                </div>
                <ul class="index-list">
                    ${entriesHtml || ''}
                </ul>
                <p class="index-page__footnote">${footnote}</p>
            </div>
            <div class="page__number">— ii —</div>
        </article>
    `;
}

// ------------------------------------------------------------
// RENDER: ENTRADA
// ------------------------------------------------------------

function renderEntry(entry) {
    const metaSegments = [];
    if (entry.location)    metaSegments.push(escapeHtml(entry.location));
    if (entry.time_of_day) metaSegments.push(escapeHtml(entry.time_of_day));
    if (entry.weather)     metaSegments.push(escapeHtml(entry.weather));

    const metaHtml = metaSegments
        .map(s => `<span class="entry-header__meta-line">${s}</span>`)
        .join('<span class="entry-header__meta-sep">·</span>');

    const partyHtml = (entry.party_present && entry.party_present.length)
        ? `<span class="entry-header__party">Presentes: ${entry.party_present.map(escapeHtml).join(', ')}</span>`
        : '';

    const blocksHtml = (entry.pages || []).map(renderBlock).join('');
    const roman = toRoman(entry.id);
    const stainsHtml = generateStainsSvg(entry.id + 100);

    const placeholderBadge = entry.is_placeholder
        ? `<div class="placeholder-badge" title="Entrada de ejemplo — reemplázame">· ejemplo ·</div>`
        : '';

    return `
        <article class="page" data-entry-id="${entry.id}">
            <div class="page-stains" aria-hidden="true">${stainsHtml}</div>
            ${placeholderBadge}
            <header class="entry-header">
                <div class="entry-header__roman">Entrada ${roman}</div>
                <h2 class="entry-header__title">${escapeHtml(entry.title)}</h2>
                <svg class="entry-header__flourish" viewBox="0 0 140 20" aria-hidden="true">
                    <use href="#orn-flourish"/>
                </svg>
                <div class="entry-header__meta">
                    ${metaHtml}
                    ${partyHtml}
                </div>
            </header>
            <div class="entry-body">
                ${blocksHtml}
            </div>
            <div class="page__number">— ${roman} —</div>
        </article>
    `;
}

// ------------------------------------------------------------
// RENDER DE UNA VISTA CUALQUIERA
// ------------------------------------------------------------

function renderViewHtml(view) {
    if (!view) return '';
    switch (view.kind) {
        case 'frontispiece': return renderFrontispiece();
        case 'index':        return renderIndex();
        case 'entry':        return renderEntry(view.entry);
        default:             return '';
    }
}

// ------------------------------------------------------------
// NAVEGACIÓN CON ANIMACIÓN DE GIRO
// ------------------------------------------------------------

function renderCurrentImmediate() {
    const mount = document.getElementById('pageCurrent');
    mount.innerHTML = renderViewHtml(STATE.views[STATE.currentView]);
    mount.className = 'page-current';
    updateNav();
    persistState();

    // Enganchar clics del índice (si estamos en él)
    wireIndexClicks();
}

// Animación de giro: el destino se renderiza debajo, la actual rota, al acabar se intercambian
function navigate(delta) {
    if (STATE.turning) return;
    const next = STATE.currentView + delta;
    if (next < 0 || next >= STATE.views.length) return;

    goToView(next, delta > 0 ? 'next' : 'prev');
}

function goToView(targetIndex, direction) {
    if (STATE.turning) return;
    if (targetIndex === STATE.currentView) return;
    if (targetIndex < 0 || targetIndex >= STATE.views.length) return;

    STATE.turning = true;

    // 'next' (siguiente): página actual gira a la izquierda, la destino aparece detrás.
    // 'prev' (anterior): animación inversa con @keyframes turnPrev.
    // Si la destino no es adyacente (salto desde índice), tratamos como 'next' si vamos adelante.
    if (direction === undefined) {
        direction = (targetIndex > STATE.currentView) ? 'next' : 'prev';
    }

    const current = document.getElementById('pageCurrent');
    const ghost   = document.getElementById('pageGhost');

    if (direction === 'next') {
        // La página destino se coloca debajo (ghost)
        ghost.innerHTML = renderViewHtml(STATE.views[targetIndex]);
        // La actual rota hacia la izquierda (rotateY -175deg)
        current.classList.add('page-current--turning-next');

        const done = () => {
            current.removeEventListener('transitionend', done);
            // Swap: ghost pasa a ser current
            current.innerHTML = renderViewHtml(STATE.views[targetIndex]);
            current.classList.remove('page-current--turning-next');
            ghost.innerHTML = '';
            STATE.currentView = targetIndex;
            STATE.turning = false;
            updateNav();
            persistState();
            wireIndexClicks();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };
        current.addEventListener('transitionend', done, { once: true });

        // Fallback por si transitionend no dispara
        setTimeout(() => {
            if (STATE.turning) done();
        }, 1100);

    } else {
        // prev: la actual empieza "girada" y vuelve a su sitio, revelando la nueva debajo
        ghost.innerHTML = current.innerHTML;
        current.innerHTML = renderViewHtml(STATE.views[targetIndex]);
        current.classList.add('page-current--turning-prev');

        const done = () => {
            current.removeEventListener('animationend', done);
            current.classList.remove('page-current--turning-prev');
            ghost.innerHTML = '';
            STATE.currentView = targetIndex;
            STATE.turning = false;
            updateNav();
            persistState();
            wireIndexClicks();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };
        current.addEventListener('animationend', done, { once: true });

        setTimeout(() => {
            if (STATE.turning) done();
        }, 1100);
    }
}

function wireIndexClicks() {
    document.querySelectorAll('.index-entry').forEach(el => {
        el.addEventListener('click', () => {
            const idx = parseInt(el.dataset.viewIndex, 10);
            if (!Number.isNaN(idx)) goToView(idx);
        });
        el.addEventListener('keydown', e => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                const idx = parseInt(el.dataset.viewIndex, 10);
                if (!Number.isNaN(idx)) goToView(idx);
            }
        });
    });
}

function updateNav() {
    const nav = document.getElementById('nav');
    const prev = document.getElementById('btnPrev');
    const next = document.getElementById('btnNext');
    const ind  = document.getElementById('navIndicator');
    const idxBtn = document.getElementById('btnIndex');

    nav.style.display = 'flex';
    prev.disabled = STATE.currentView <= 0;
    next.disabled = STATE.currentView >= STATE.views.length - 1;

    const view = STATE.views[STATE.currentView];
    let label;
    if (view.kind === 'frontispiece')  label = 'Frontispicio';
    else if (view.kind === 'index')    label = 'Índice';
    else if (view.kind === 'entry')    label = `Entrada ${toRoman(view.entry.id)}`;
    ind.textContent = label;

    // El botón de índice oculta si ya estamos en él
    idxBtn.style.visibility = (view.kind === 'index') ? 'hidden' : 'visible';
}

// ------------------------------------------------------------
// PERSISTENCIA
// ------------------------------------------------------------

function persistState() {
    try {
        localStorage.setItem(LS_LAST_VIEW, String(STATE.currentView));
        localStorage.setItem(LS_OPENED, STATE.opened ? '1' : '0');
    } catch (e) { /* ignore */ }
}

function restoreState() {
    try {
        const v = localStorage.getItem(LS_LAST_VIEW);
        const o = localStorage.getItem(LS_OPENED);
        if (v != null) {
            const idx = parseInt(v, 10);
            if (!Number.isNaN(idx) && idx >= 0 && idx < STATE.views.length) {
                STATE.currentView = idx;
            }
        }
        STATE.opened = (o === '1');
    } catch (e) { /* ignore */ }
}

// ------------------------------------------------------------
// APERTURA DEL LIBRO
// ------------------------------------------------------------

function openBook() {
    if (STATE.opened) return;
    const cover = document.getElementById('bookCover');
    const openC = document.getElementById('bookOpen');

    cover.classList.add('book-cover--opening');

    // Tras la animación, sustituir por libro abierto
    setTimeout(() => {
        cover.classList.add('book-cover--opened');
        openC.classList.add('book-open--visible');
        document.body.classList.add('book-is-open');
        STATE.opened = true;
        renderCurrentImmediate();
        persistState();
    }, 1150);
}

function closeBook() {
    const cover = document.getElementById('bookCover');
    const openC = document.getElementById('bookOpen');
    openC.classList.remove('book-open--visible');
    cover.classList.remove('book-cover--opened', 'book-cover--opening');
    document.body.classList.remove('book-is-open');
    STATE.opened = false;
    persistState();
}

// ------------------------------------------------------------
// HEADER desde broin.json
// ------------------------------------------------------------

function renderHeaderFromBroin() {
    if (!STATE.broin || !STATE.broin.book) return;
    const bk = STATE.broin.book;
    const set = (id, val) => { const el = document.getElementById(id); if (el && val) el.textContent = val; };

    // Tapa
    set('coverTitle',    bk.title);
    set('coverSubtitle', bk.subtitle);
    set('coverChapter',  bk.current_chapter);

    // Libro abierto
    set('openTitle',    bk.title);
    set('openSubtitle', bk.subtitle);
    set('openChapter',  bk.current_chapter);
}

// ------------------------------------------------------------
// PARTÍCULAS DE POLVO
// ------------------------------------------------------------

function spawnDust() {
    const host = document.getElementById('dust');
    const N = 18;
    for (let i = 0; i < N; i++) {
        const p = document.createElement('div');
        p.className = 'dust__particle';
        const startX = Math.random() * 40;
        const startY = 60 + Math.random() * 40;
        const driftX = (Math.random() - 0.3) * 200;
        const driftY = -(40 + Math.random() * 50);
        const dur    = 25 + Math.random() * 35;
        const delay  = Math.random() * dur;
        const size   = 1.3 + Math.random() * 1.8;

        p.style.left = startX + 'vw';
        p.style.top  = startY + 'vh';
        p.style.width = p.style.height = size + 'px';
        p.style.setProperty('--drift-x', driftX + 'px');
        p.style.setProperty('--drift-y', driftY + 'vh');
        p.style.animation = `drift ${dur}s ${delay}s linear infinite`;
        p.style.opacity = '0';
        host.appendChild(p);
    }
}

// ------------------------------------------------------------
// INIT
// ------------------------------------------------------------

async function init() {
    detectEditMode();
    spawnDust();

    const ok = await loadData();
    if (!ok) return;

    renderHeaderFromBroin();
    restoreState();

    if (STATE.opened) {
        // Saltar directamente al libro abierto
        document.getElementById('bookCover').classList.add('book-cover--opened');
        document.getElementById('bookOpen').classList.add('book-open--visible');
        document.body.classList.add('book-is-open');
        renderCurrentImmediate();
    }

    // Clic en tapa = abrir
    document.getElementById('bookCover').addEventListener('click', openBook);
    document.getElementById('bookCover').addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openBook(); }
    });

    // Cerrar libro
    document.getElementById('btnCloseBook').addEventListener('click', closeBook);

    // Navegación
    document.getElementById('btnPrev').addEventListener('click',  () => navigate(-1));
    document.getElementById('btnNext').addEventListener('click',  () => navigate( 1));
    document.getElementById('btnIndex').addEventListener('click', () => goToView(1));

    // Teclado
    document.addEventListener('keydown', e => {
        if (e.target.isContentEditable) return;
        if (!STATE.opened) {
            if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openBook(); }
            return;
        }
        if (e.key === 'ArrowLeft')  navigate(-1);
        if (e.key === 'ArrowRight') navigate( 1);
        if (e.key === 'Escape')     closeBook();
    });

    // Swipe táctil básico
    let touchStartX = null;
    document.addEventListener('touchstart', e => {
        if (e.touches.length === 1) touchStartX = e.touches[0].clientX;
    }, { passive: true });
    document.addEventListener('touchend', e => {
        if (touchStartX == null) return;
        const dx = e.changedTouches[0].clientX - touchStartX;
        if (!STATE.opened) {
            if (Math.abs(dx) < 30) openBook();
        } else {
            if (dx > 60)       navigate(-1);
            else if (dx < -60) navigate( 1);
        }
        touchStartX = null;
    }, { passive: true });
}

document.addEventListener('DOMContentLoaded', init);

    </script>
